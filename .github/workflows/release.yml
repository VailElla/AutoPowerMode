name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
      ASSET_NAME: AutoPowerMode-${{ github.ref_name }}-win-x64-self-contained.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained Windows app
        shell: pwsh
        run: >-
          dotnet publish AutoPowerMode.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Package release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path publish\AutoPowerMode.exe -DestinationPath "dist\$env:ASSET_NAME" -Force
          @"
          # AutoPowerMode $env:TAG_NAME

          ## 普通用户下载方式

          1. 下载 `$env:ASSET_NAME`
          2. 解压 zip
          3. 双击 `AutoPowerMode.exe`

          这是 Windows x64 自包含版本，不需要安装 .NET SDK。
          "@ | Set-Content -Path release-notes.md -Encoding UTF8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (gh release view "$env:TAG_NAME" --repo "$env:GITHUB_REPOSITORY" *> $null) {
            Write-Host "Release $env:TAG_NAME already exists. Uploading asset if it is missing."
            gh release upload "$env:TAG_NAME" "dist\$env:ASSET_NAME" --repo "$env:GITHUB_REPOSITORY" --clobber
            gh release edit "$env:TAG_NAME" --repo "$env:GITHUB_REPOSITORY" --title "AutoPowerMode $env:TAG_NAME" --notes-file release-notes.md --latest
            exit 0
          }

          gh release create "$env:TAG_NAME" "dist\$env:ASSET_NAME" --repo "$env:GITHUB_REPOSITORY" --target "$env:GITHUB_SHA" --title "AutoPowerMode $env:TAG_NAME" --notes-file release-notes.md --latest
