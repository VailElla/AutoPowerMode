name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
      PACKAGE_DIR: AutoPowerMode-${{ github.ref_name }}-win-x64-framework-dependent
      ASSET_NAME: AutoPowerMode-${{ github.ref_name }}-win-x64-framework-dependent.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run logic tests
        shell: pwsh
        run: dotnet run --project tests/AutoPowerMode.Tests/AutoPowerMode.Tests.csproj --configuration Release

      - name: Publish framework-dependent Windows app
        shell: pwsh
        run: >-
          dotnet publish src/AutoPowerMode/AutoPowerMode.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=false
          -p:DebugType=None
          -p:DebugSymbols=false
          -o publish

      - name: Package release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path "dist\$env:PACKAGE_DIR" | Out-Null
          Copy-Item -Path publish\* -Destination "dist\$env:PACKAGE_DIR" -Recurse -Force
          Compress-Archive -Path "dist\$env:PACKAGE_DIR" -DestinationPath "dist\$env:ASSET_NAME" -Force

          if (-not (Test-Path CHANGELOG.md)) {
            throw "CHANGELOG.md is required for GitHub release notes."
          }

          $changelog = Get-Content -Raw -Encoding UTF8 CHANGELOG.md
          $tagPattern = [regex]::Escape($env:TAG_NAME)
          $match = [regex]::Match($changelog, "(?ms)^## \[$tagPattern\][^\r\n]*(?:\r?\n)(.*?)(?=^## \[|\z)")

          if (-not $match.Success -or [string]::IsNullOrWhiteSpace($match.Groups[1].Value)) {
            throw "Missing CHANGELOG.md notes for $($env:TAG_NAME)."
          }

          $releaseHighlights = $match.Groups[1].Value.Trim()
          @"
          # AutoPowerMode $env:TAG_NAME

          ## 本次更新功能

          $releaseHighlights

          ## 下载与运行

          1. 下载 ``$env:ASSET_NAME``
          2. 解压 zip
          3. 进入解压后的文件夹，双击 ``AutoPowerMode.exe``

          Windows x64 framework-dependent 版本，体积较小，不内置 .NET 运行时。
          运行前需要 Windows 已安装 .NET 8 Desktop Runtime；不需要安装 .NET SDK。
          "@ | Set-Content -Path release-notes.md -Encoding UTF8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (gh release view "$env:TAG_NAME" --repo "$env:GITHUB_REPOSITORY" *> $null) {
            Write-Host "Release $env:TAG_NAME already exists. Uploading asset if it is missing."
            gh release upload "$env:TAG_NAME" "dist\$env:ASSET_NAME" --repo "$env:GITHUB_REPOSITORY" --clobber
            gh release edit "$env:TAG_NAME" --repo "$env:GITHUB_REPOSITORY" --title "AutoPowerMode $env:TAG_NAME" --notes-file release-notes.md --latest
            exit 0
          }

          gh release create "$env:TAG_NAME" "dist\$env:ASSET_NAME" --repo "$env:GITHUB_REPOSITORY" --target "$env:GITHUB_SHA" --title "AutoPowerMode $env:TAG_NAME" --notes-file release-notes.md --latest
